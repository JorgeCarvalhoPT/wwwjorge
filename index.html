<html lang="en">
<head>

  <meta property="og:type" content="website" />

  <meta property="og:description" content="Application Security Engineer with AI security in mind. Interactive terminal CV — type a command to explore." />
  <meta property="og:image" content="og.svg" />
  <meta property="og:image:alt" content="0xB@ne terminal CV" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="0xB@ne — AppSec & AI Security" />
  <meta name="twitter:description" content="Application Security Engineer with AI security in mind. Interactive terminal CV." />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23050805'/><text x='50' y='54' font-family='monospace' font-size='78' font-weight='700' fill='%2339ff8a' text-anchor='middle' dominant-baseline='central'>0</text></svg>" />
</head>
<body>
  <canvas id="matrix" aria-hidden="true"></canvas>
  <main class="terminal" id="terminal" aria-label="Interactive terminal CV">
    <div class="titlebar">
      <div class="lights">
        <span class="light red"></span>
        <span class="light yellow"></span>
        <span class="light green"></span>
      </div>
      <div class="title">root@0xB@ne — /bin/zsh — secure shell</div>
      <div class="titlebar-right">⌘</div>
    </div>

    <nav class="quicknav" id="quicknav" aria-label="Quick navigation">
      <button class="navchip" data-cmd="about">about</button>
      <button class="navchip" data-cmd="experience">experience</button>
      <button class="navchip" data-cmd="skills">skills</button>
      <button class="navchip" data-cmd="projects">projects</button>
      <button class="navchip" data-cmd="education">education</button>
      <button class="navchip" data-cmd="contact">contact</button>
      <button class="navchip" data-cmd="resume">resume</button>
      <button class="navchip" data-cmd="help">help</button>
    </nav>

    <div class="screen" id="screen" tabindex="0">
      <div id="output" role="log" aria-live="polite" aria-atomic="false"></div>
      <div class="input-line" id="inputLine" hidden>
        <span class="prompt"><span class="user">root@0xB@ne</span><span class="colon">:</span><span class="path">~</span><span class="dollar">#</span></span>
        <span class="input-wrap">
          <input id="cmdInput" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" aria-label="Command input" />
          <span class="fake-cursor" id="fakeCursor"></span>
        </span>
      </div>
    </div>
  </main>

  <div class="hint" id="hint">Type <kbd>help</kbd> and press <kbd>Enter</kbd> — or click a command above.</div>

  <script src="data.js"></script>
  <script src="matrix.js"></script>
  <script src="terminal.js"></script>
</body>
</html>

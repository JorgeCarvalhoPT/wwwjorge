<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'JetBrains Mono', monospace">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0c1f12"/>
      <stop offset="100%" stop-color="#050805"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- terminal window -->
  <rect x="120" y="110" width="960" height="410" rx="16" fill="#0a0f0a" stroke="#1c3322" stroke-width="2"/>
  <rect x="120" y="110" width="960" height="44" rx="16" fill="#0e160e"/>
  <circle cx="152" cy="132" r="7" fill="#ff5f57"/>
  <circle cx="176" cy="132" r="7" fill="#febc2e"/>
  <circle cx="200" cy="132" r="7" fill="#28c840"/>
  <text x="600" y="137" fill="#4f8f63" font-size="16" text-anchor="middle">root@0xB@ne — secure shell</text>

  <!-- scanlines hint -->
  <g opacity="0.06" fill="#39ff8a">
    <rect x="120" y="170" width="960" height="2"/>
    <rect x="120" y="200" width="960" height="2"/>
    <rect x="120" y="230" width="960" height="2"/>
    <rect x="120" y="260" width="960" height="2"/>
  </g>

  <!-- prompt + name -->
  <text x="160" y="240" font-size="26" fill="#4d8761">0xB@ne:~/cv$ <tspan fill="#b9f5c9">whoami</tspan></text>
  <text x="160" y="330" font-size="84" font-weight="700" fill="#39ff8a" filter="url(#glow)">0xB@ne</text>
  <text x="160" y="392" font-size="30" fill="#b9f5c9">Application Security Engineer <tspan fill="#4d8761">·</tspan> AI Security</text>
  <text x="160" y="446" font-size="22" fill="#4d8761">AppSec · LLM guardrails · pentesting · NullPointer / Agent-Smith</text>
  <text x="160" y="492" font-size="20" fill="#39ff8a">▸ type `help` to explore</text>
</svg>
